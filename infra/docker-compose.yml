services:
  postgres:
    image: postgres:16-alpine
    container_name: ie-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dane
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ie-network
    restart: unless-stopped

  api:
    labels:
      - com.ie.backend=api
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: ie-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./.env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dane}
      JWT_SEED: ${JWT_SEED}
    ports:
      - "2538:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/', r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ie-network
    restart: unless-stopped

  client:
    labels:
      - com.ie.frontend=client
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: ie-client
    depends_on:
      api:
        condition: service_healthy
    env_file: ./.env
    environment:
      NODE_ENV: production
      NEST_API_URL: ${NEST_API_URL:-http://api:4000}
    networks:
      - ie-network

    ports:
      - "2539:3000"
    restart: unless-stopped

volumes:
  postgres_data:
    external: false
    
networks:
  ie-network: