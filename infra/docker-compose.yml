services:
  postgres:
    image: postgres:16-alpine
    container_name: ie-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dane
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ie-network
    restart: unless-stopped

  api:
    labels:
      - com.ie.backend=api
    build:
      context: .
      dockerfile: ./app/Dockerfile
    container_name: ie-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./.env
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SEED: ${JWT_SEED}
    ports:
      - "9000:8000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/health', r=>process.exit(r.statusCode===200?0:1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    # shm_size: '1gb'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
        - ie-network
    restart: unless-stopped

  client:
    labels:
      - com.ie.frontend=client
    build:
      context: .
      dockerfile: ./client/Dockerfile
    container_name: ie-client
    depends_on:
      api:
        condition: service_healthy
    env_file: ./.env
    environment:
      NODE_ENV: production
      # AUTH_SECRET: ${AUTH_SECRET}
      # NEXT_PUBLIC_SECRET_KEY: ${NEXT_PUBLIC_SECRET_KEY}
      NEST_API_URL: ${NEST_API_URL}
    networks:
      - ie-network

    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
    external: false
    
networks:
  ie-network: